  * {

    /* Estilização da Tela de Login */
.login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);

    /* Tela de carregamento */
.loader-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(26, 26, 26, 0.95); /* Fundo quase opaco */
    display: none; /* Escondido por padrão */
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999; /* Por cima de tudo */
    gap: 20px;
}

.loader-text {
    color: #fff;
    font-weight: 600;
    letter-spacing: 1px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* CSS que você enviou do Uiverse */
.loader {
  position: relative;
  font-size: 16px;
  width: 5.5em;
  height: 5.5em;
}

.loader:before {
  content: '';
  position: absolute;
  transform: translate(-50%, -50%) rotate(45deg);
  height: 100%;
  width: 4px;
  background: #fff;
  left: 50%;
  top: 50%;
}

.loader:after {
  content: '';
  position: absolute;
  left: 0.2em;
  bottom: 0.18em;
  width: 1em;
  height: 1em;
  background-color: #dc3545; /* Mudei para o seu vermelho maker, original era orange */
  border-radius: 15%;
  animation: rollingRock 2.5s cubic-bezier(.79, 0, .47, .97) infinite;
}

@keyframes rollingRock {
  0% { transform: translate(0, -1em) rotate(-45deg) }
  5% { transform: translate(0, -1em) rotate(-50deg) }
  20% { transform: translate(1em, -2em) rotate(47deg) }
  25% { transform: translate(1em, -2em) rotate(45deg) }
  30% { transform: translate(1em, -2em) rotate(40deg) }
  45% { transform: translate(2em, -3em) rotate(137deg) }
  50% { transform: translate(2em, -3em) rotate(135deg) }
  55% { transform: translate(2em, -3em) rotate(130deg) }
  70% { transform: translate(3em, -4em) rotate(217deg) }
  75% { transform: translate(3em, -4em) rotate(220deg) }
  100% { transform: translate(0, -1em) rotate(-225deg) }
}

</div>

  <script>
   // 1. CONFIGURAÇÕES E CONEXÃO
const SUPABASE_URL = 'https://ddowzcnpbhrlsjtkdivz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_G1nqjS9ka2hmsVEEHPjd2A_OMLW9dTu'; 
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const defaultConfig = {
  system_title: "Sistema de Gerenciamento - Espaço Maker",
  welcome_message: "Bem-vindo ao Sistema Maker"
};

let students = [];
let seriesProjectsConfig = {};
let currentView = 'checklist';
let isAuthenticated = false;

const filters = {
  sede: '',
  serie: '',
  turma: '',
  projeto: 'projeto1'
};

// 2. BUSCA E FILTRAGEM
async function fetchStudents() {
  const { data, error } = await _supabase
    .from('students')
    .select('*')
    .eq('ativo', true);

  if (error) {
    console.error("Erro ao buscar alunos:", error);
  } else {
    // Ordena por nome logo na chegada dos dados
    students = data.sort((a, b) => 
      a.nome_aluno.localeCompare(b.nome_aluno, 'pt-BR', { sensitivity: 'base' })
    ).map(s => ({ ...s, __backendId: s.id }));

    students.forEach(student => {
      if (student.serie && student.projetos_config) {
        try {
          seriesProjectsConfig[student.serie] = typeof student.projetos_config === 'string'
            ? JSON.parse(student.projetos_config)
            : student.projetos_config;
        } catch (e) { console.error("Erro config:", e); }
      }
    });
    renderCurrentView();
  }
}

function getUniqueValues(key) {
  return [...new Set(students.map(s => s[key]).filter(Boolean))].sort();
}

function getFilteredUniqueValues(baseKey, currentFilters = {}) {
  let filtered = students;
  if (currentFilters.sede) filtered = filtered.filter(s => s.sede === currentFilters.sede);
  if (currentFilters.serie) filtered = filtered.filter(s => s.serie === currentFilters.serie);
  return [...new Set(filtered.map(s => s[baseKey]).filter(Boolean))].sort();
}

function filterStudents() {
  const filtered = students.filter(student => {
    if (filters.sede && student.sede !== filters.sede) return false;
    if (filters.serie && student.serie !== filters.serie) return false;
    if (filters.turma && student.nome_turma !== filters.turma) return false;
    return true;
  });

  // Reforça a ordem alfabética após o filtro
  return filtered.sort((a, b) => 
    a.nome_aluno.localeCompare(b.nome_aluno, 'pt-BR', { sensitivity: 'base' })
  );
}

    window.importSpreadsheet = (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async (e) => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: 'array' });
    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
    const jsonData = XLSX.utils.sheet_to_json(firstSheet);

    if (jsonData.length === 0) {
      alert("A planilha está vazia.");
      return;
    }

    // Criar o overlay de progresso visual
    const progressOverlay = document.createElement('div');
    progressOverlay.className = 'progress-overlay';
    progressOverlay.innerHTML = `
      <div class="progress-container">
        <div class="progress-title">Importando Alunos</div>
        <div class="progress-info" id="import-status">Processando...</div>
        <div class="progress-bar-wrapper">
          <div class="progress-bar-fill" id="progress-fill" style="width: 0%">0%</div>
        </div>
      </div>`;
    document.body.appendChild(progressOverlay);

    const statusText = document.getElementById('import-status');
    const fill = document.getElementById('progress-fill');

    let importedCount = 0;

    for (let i = 0; i < jsonData.length; i++) {
      const row = jsonData[i];
      
      // Normalização de colunas (converte nomes para maiúsculo e remove espaços)
      const cleanRow = {};
      Object.keys(row).forEach(key => {
        const normalizedKey = key.toUpperCase().trim().replace(/\s+/g, '_');
        cleanRow[normalizedKey] = row[key];
      });

      const serie = String(cleanRow.SERIE || cleanRow.SÉRIE || '');
      
      // Busca configuração de projeto existente ou define padrão
      const config = seriesProjectsConfig[serie] || {
        projeto1: { nome: 'Projeto 1', etapas: ['Etapa 1', 'Etapa 2', 'Etapa 3'] },
        projeto2: { nome: 'Projeto 2', etapas: ['Etapa 1', 'Etapa 2', 'Etapa 3'] },
        projeto3: { nome: 'Projeto 3', etapas: ['Etapa 1', 'Etapa 2', 'Etapa 3'] }
      };

      const studentData = {
        nome_aluno: cleanRow.NOME_ALUNO || cleanRow.ALUNO || cleanRow.NOME || 'Sem Nome',
        matricula: String(cleanRow.RA || cleanRow.MATRICULA || ''),
        sede: cleanRow.SEDE || '',
        serie: serie,
        nome_turma: cleanRow.NOME_TURMA || cleanRow.TURMA || '',
        turno: cleanRow.TURNO || '',
        projetos_config: config,
        projeto1_etapas: { checklist: [], observacoes: [] },
        projeto2_etapas: { checklist: [], observacoes: [] },
        projeto3_etapas: { checklist: [], observacoes: [] },
        ativo: true
      };

      statusText.innerHTML = `Enviando: <strong>${studentData.nome_aluno}</strong>`;
      
      // Inserção no Supabase
      const { error } = await _supabase.from('students').insert([studentData]);

      if (!error) {
        importedCount++;
      } else {
        console.error("Erro ao importar aluno:", error);
      }

      // Atualiza barra de progresso
      const pct = Math.round(((i + 1) / jsonData.length) * 100);
      fill.style.width = pct + '%';
      fill.textContent = pct + '%';

      // Pequeno intervalo para evitar gargalo na API
      await new Promise(r => setTimeout(r, 50));
    }

    statusText.innerHTML = `<span style="color: #28a745;">${importedCount} alunos importados com sucesso!</span>`;
    
    setTimeout(() => {
      progressOverlay.remove();
      fetchStudents(); // Recarrega a lista principal
    }, 2000);
  };

  reader.readAsArrayBuffer(file);
  event.target.value = ''; // Reseta o input de arquivo
};

    window.showProjectConfigModal = () => {
  const series = getUniqueValues('serie');
  if (series.length === 0) {

window.addStepRow = (key) => {
  const container = document.getElementById(`config-${key}-stages-list`);
  if (!container) return; // Segurança caso o container não seja encontrado
  
  const div = document.createElement('div');
  div.style = "display:flex; gap:0.5rem; margin-bottom:0.5rem;";
  div.innerHTML = `<input type="text" class="form-input stage-input-${key}" value="Nova Etapa">`;
  container.appendChild(div);
};

window.removeStepRow = (key) => {
  const container = document.getElementById(`config-${key}-stages-list`);
  if (!container) return;

  // Garante que sempre sobre pelo menos uma etapa (não deixa a lista vazia)
  if (container.children.length > 1) {
    container.removeChild(container.lastChild);
  } else {
    alert("O projeto precisa ter pelo menos uma etapa.");
  }
};

window.showObservationModal = (studentId, projectKey, stageIndex) => {
  const student = students.find(s => s.id === studentId);
  const data = getStudentProjectData(student, projectKey);
  const currentObs = (data.observacoes && data.observacoes[stageIndex]) ? data.observacoes[stageIndex] : '';

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Observação</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <textarea id="obs-text" class="form-input" rows="5">${currentObs}</textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveObservation('${studentId}', '${projectKey}', ${stageIndex})">Salvar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
};

function getStudentProjectData(student, projectKey) {
  let data = student[projectKey + '_etapas'];
  if (!data) return { checklist: [], observacoes: [] };
  return typeof data === 'string' ? JSON.parse(data) : data;
}

// 3. AÇÕES (CRUD)
window.updateFilter = (key, value) => {
    filters[key] = value;
    
    if (key === 'sede') {
        filters.serie = '';
        filters.turma = '';
    } else if (key === 'serie') {
        filters.turma = '';
        // Opcional: filters.projeto = 'projeto1'; // Reseta para o primeiro projeto da nova série
    }

    renderCurrentView(); // Isso reconstrói a tela com os novos nomes
};

window.clearFilters = () => {
  filters.sede = ''; filters.serie = ''; filters.turma = ''; filters.projeto = 'projeto1';
  renderCurrentView();
};

window.toggleStage = async (id, projectKey, stageIndex, checked) => {
  const student = students.find(s => s.id === id);
  let data = getStudentProjectData(student, projectKey);
  if(!data.checklist) data.checklist = [];
  data.checklist[stageIndex] = checked;

  await _supabase.from('students').update({ [projectKey + '_etapas']: data }).eq('id', id);
  student[projectKey + '_etapas'] = data;
  renderCurrentView();
};

window.saveObservation = async (studentId, projectKey, stageIndex) => {
  const student = students.find(s => s.id === studentId);
  const obsText = document.getElementById('obs-text').value;
  let data = getStudentProjectData(student, projectKey);
  if (!data.observacoes) data.observacoes = [];
  data.observacoes[stageIndex] = obsText;

  await _supabase.from('students').update({ [projectKey + '_etapas']: data }).eq('id', studentId);
  student[projectKey + '_etapas'] = data;
  closeModal();
  renderCurrentView();
};

window.saveNewStudent = async () => {
    const form = document.getElementById('add-student-form');
    const formData = new FormData(form);
    
    // Criamos o objeto com todos os campos necessários
    const newStudent = {
        nome_aluno: formData.get('nome_aluno'),
        matricula: formData.get('matricula'),
        sede: formData.get('sede'),
        serie: formData.get('serie'),
        nome_turma: formData.get('nome_turma'),
        ativo: true,
        // Inicializa as colunas de etapas com a estrutura padrão
        projeto1_etapas: { checklist: [], observacoes: [] },
        projeto2_etapas: { checklist: [], observacoes: [] },
        projeto3_etapas: { checklist: [], observacoes: [] }
    };

    // Verificação simples
    if (!newStudent.nome_aluno || !newStudent.serie) {
        alert("Por favor, preencha pelo menos Nome e Série.");
        return;
    }

    try {
        const { error } = await _supabase.from('students').insert([newStudent]);
        
        if (error) throw error;

        alert("Aluno cadastrado com sucesso!");
        closeModal();
        await fetchStudents(); // Recarrega a tabela principal
    } catch (err) {
        console.error("Erro ao inserir:", err);
        alert("Erro ao salvar o aluno. Verifique a consola.");
    }
};

window.saveProjectConfig = async () => {
  const btn = document.getElementById('btn-save-project-config');
  const serie = document.getElementById('serie-selector-config').value;
  const loaderScreen = document.getElementById('loader-screen');

  // Mostra o loader de cubinho enquanto salva
  if (loaderScreen) loaderScreen.style.display = 'flex';
  
  btn.disabled = true;

  try {
    const newConfig = {};
    ['projeto1', 'projeto2', 'projeto3'].forEach(key => {
      // Captura o nome pelo ID correto
      const nomeElement = document.getElementById(`config-${key}-nome`);
      if (!nomeElement) throw new Error(`Elemento config-${key}-nome não encontrado`);
      
      const nome = nomeElement.value;
      const inputs = document.querySelectorAll(`.stage-input-${key}`);
      const etapas = Array.from(inputs).map(input => input.value);
      
      newConfig[key] = { nome, etapas };
    });

    // Atualização em massa no Supabase para todos os alunos da série
    const studentsToUpdate = students.filter(s => s.serie === serie);
    
    for (const student of studentsToUpdate) {
        const p1 = getStudentProjectData(student, 'projeto1');
        const p2 = getStudentProjectData(student, 'projeto2');
        const p3 = getStudentProjectData(student, 'projeto3');

        const payload = {
            projetos_config: newConfig,
            projeto1_etapas: { ...p1, nome: newConfig.projeto1.nome, etapas: newConfig.projeto1.etapas },
            projeto2_etapas: { ...p2, nome: newConfig.projeto2.nome, etapas: newConfig.projeto2.etapas },
            projeto3_etapas: { ...p3, nome: newConfig.projeto3.nome, etapas: newConfig.projeto3.etapas }
        };

        await _supabase.from('students').update(payload).eq('id', student.id);
    }

    seriesProjectsConfig[serie] = newConfig;
    
    setTimeout(() => {
      if (loaderScreen) loaderScreen.style.display = 'none';
      closeModal();
      fetchStudents(); // Atualiza a tela principal
    }, 1000);

  } catch (err) {
    console.error("Erro ao salvar config:", err);
    alert("Erro ao salvar configurações. Verifique o console.");
    if (loaderScreen) loaderScreen.style.display = 'none';
    btn.disabled = false;
  }
};

    window.exportToExcel = () => {
    const filteredStudents = filterStudents(); // Pega os alunos filtrados na tela
    if (filteredStudents.length === 0) {
        alert("Não há dados para exportar com os filtros atuais.");
        return;
    }

    const selectedProjectKey = filters.projeto || 'projeto1';
    
    // 1. Define o cabeçalho dinâmico com base nas etapas do projeto atual
    let projConfig = { nome: 'Projeto', etapas: ['Etapa 1', 'Etapa 2', 'Etapa 3'] };
    if (filters.serie && seriesProjectsConfig[filters.serie]) {
        projConfig = seriesProjectsConfig[filters.serie][selectedProjectKey];
    }

    // 2. Prepara os dados linha por linha
    const dataToExport = filteredStudents.map(student => {
        const studentProjectData = getStudentProjectData(student, selectedProjectKey);
        const checklist = studentProjectData.checklist || [];
        const observacoes = studentProjectData.observacoes || [];

        // Informações básicas
        const row = {
            "Nome do Aluno": student.nome_aluno,
            "Sede": student.sede,
            "Série": student.serie,
            "Turma": student.nome_turma,
            "Sala": student.grupo || 'Não atribuída',
            "Status": (projConfig.etapas.length > 0 && checklist.length >= projConfig.etapas.length && checklist.every(v => v === true)) ? "CONCLUÍDO" : "EM ANDAMENTO"
        };

        // Adiciona as etapas dinamicamente como colunas
        projConfig.etapas.forEach((etapa, index) => {
            const statusEtapa = checklist[index] ? "OK" : "Pendente";
            const obsEtapa = observacoes[index] ? ` (Obs: ${observacoes[index]})` : "";
            row[etapa] = statusEtapa + obsEtapa;
        });

        return row;
    });

    // 3. Gera a planilha usando a biblioteca SheetJS (xlsx)
    const worksheet = XLSX.utils.json_to_sheet(dataToExport);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Relatorio_Maker");

    // 4. Define o nome do arquivo com a data atual e filtros
    const fileName = `Relatorio_Maker_${filters.serie || 'Geral'}_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.xlsx`;

    // 5. Dispara o download
    XLSX.writeFile(workbook, fileName);
};

// 5. LOGIN E INICIALIZAÇÃO
function renderCurrentView() {
  const app = document.getElementById('app');
  const loaderScreen = document.getElementById('loader-screen');

  if (!isAuthenticated) {
    // Renderiza a Interface de Login
    app.innerHTML = `
      <div class="login-screen">
        <div class="login-box">
          <i class="fa-solid fa-gears logo-icon"></i>
          <h1 class="login-title">${defaultConfig.system_title}</h1>
          <p class="login-subtitle">Acesso restrito para professores</p>
          
          <div id="login-error"></div>
          
          <form id="login-form">
            <div class="form-group">
              <label class="form-label" style="text-align: center; display: block;">Digite a Senha de Acesso</label>
              <input type="password" id="password-input" class="form-input" placeholder="••••••" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-login">
              Entrar no Sistema <i class="fa-solid fa-arrow-right"></i>
            </button>
          </form>
          
          <p style="margin-top: 2rem; font-size: 0.75rem; color: #666;">
            &copy; 2026 Espaço Maker - Todos os direitos reservados
          </p>
        </div>
      </div>`;

    // Configura o evento de submissão do formulário
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const passInput = document.getElementById('password-input');
      const errorDiv = document.getElementById('login-error');

      // Verifica a senha (ajuste conforme sua necessidade)
      if (passInput.value === '123456') {
        localStorage.setItem('maker_authenticated', 'true');
        // 1. Ativa o Loader Visual que você escolheu
        if (loaderScreen) loaderScreen.style.display = 'flex';

        try {
          // 2. Tenta carregar os dados do Supabase
          isAuthenticated = true;
          await fetchStudents(); 

          // 3. Pequeno delay para o usuário ver a animação e garantir o carregamento
          setTimeout(() => {
            if (loaderScreen) loaderScreen.style.display = 'none';
            renderCurrentView(); // Re-renderiza para mostrar o App principal
          }, 1500);

        } catch (error) {
          console.error("Erro na autenticação:", error);
          if (loaderScreen) loaderScreen.style.display = 'none';
          isAuthenticated = false;
          errorDiv.innerHTML = `<div class="error-message">Erro de conexão com o banco.</div>`;
        }
      } else {
        // Erro de senha incorreta
        errorDiv.innerHTML = `
          <div class="error-message" style="margin-bottom: 1rem; font-size: 0.85rem; padding: 0.8rem;">
            <i class="fa-solid fa-circle-exclamation"></i> Senha incorreta. Tente novamente.
          </div>`;
        passInput.value = '';
        passInput.focus();
      }
    });
  } else {
    // Se autenticado, renderiza a aplicação principal
    app.innerHTML = showMainApp();
    
    // Garante que o loader esteja escondido ao entrar no app
    if (loaderScreen) loaderScreen.style.display = 'none';
  }
}

    window.handleLogout = () => {
    if (confirm("Deseja realmente sair do sistema?")) {
        // REMOVE A SESSÃO SALVA
        localStorage.removeItem('maker_authenticated');
        
        isAuthenticated = false;
        students = [];
        seriesProjectsConfig = {};
        renderCurrentView();
    }
};

function showMainApp() {
    return `
    <div class="header">
        <h1 class="header-title">${defaultConfig.system_title}</h1>
        <button class="btn btn-secondary" onclick="handleLogout()" style="width: auto; padding: 0.5rem 1rem; font-size: 0.8rem; background: #444;">
            <i class="fa-solid fa-right-from-bracket"></i> Sair
        </button>
    </div>
    <div class="content">
        ${showChecklistView()}
    </div>`;
}

    async function fetch_and_restore() {
    await fetchStudents();
    document.getElementById('loader-screen').style.display = 'none';
    renderCurrentView();
}
function closeModal() { document.querySelector('.modal-overlay')?.remove(); }

// Inicialização com Verificação de Persistência
document.addEventListener('DOMContentLoaded', () => {
    // Verifica se o usuário já logou anteriormente
    const savedAuth = localStorage.getItem('maker_authenticated');
    
    if (savedAuth === 'true') {
        isAuthenticated = true;
        // Se já estava logado, mostra o loader e busca os dados
        document.getElementById('loader-screen').style.display = 'flex';
        fetch_and_restore();
    } else {
        renderCurrentView();
    }
});
